<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#shine)"/>

  <!-- Upward arrow (the "Up" in PalUp) — represents growth, autonomy -->
  <path d="M256 136 L336 232 L296 232 L296 344 L216 344 L216 232 L176 232 Z" fill="url(#arrow)"/>

  <!-- Small orbit circle (represents autonomous/AI) -->
  <circle cx="340" cy="180" r="28" fill="none" stroke="#fff" stroke-width="8" stroke-opacity="0.6"/>
  <circle cx="354" cy="166" r="10" fill="#fff" fill-opacity="0.9"/>
</svg>
