<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Minimal "P" letterform built from geometric shapes -->
  <rect x="152" y="128" width="36" height="256" rx="4" fill="url(#accent)"/>
  <path d="M188 128 h80 a72 72 0 0 1 0 144 h-80" fill="none" stroke="url(#accent)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small upward tick on the right — the "Up" -->
  <path d="M340 240 L368 200 L396 240" fill="none" stroke="#818cf8" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
</svg>
